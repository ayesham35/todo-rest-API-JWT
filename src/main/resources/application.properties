spring.application.name=todoapi
# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT settings
# Generate a real secret with: openssl rand -base64 64
# Do NOT use this value in production
app.jwt.secret=Y291bGRudWNkbXltb2RpYWZ5b3VzaG91bGRyZWFsbHlnZW5lcmF0ZXlvdXJvd25zZWNyZXRrZXloZXJlcGxlYXNlZG90aGlz
app.jwt.expiration-ms=3600000

# Logging
logging.level.org.springframework.security=DEBUG

